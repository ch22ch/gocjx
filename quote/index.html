<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/quote/cjx-favicon.svg">
  <title>Online Quoting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Outfit', sans-serif; } .spinner { border: 3px solid #e2e8f0; border-top-color: #0ea5e9; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } } .fade-in { animation: fadeIn 0.3s ease-in; } @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }</style>
</head>
<body class="min-h-screen">
  <div id="app"></div>
  <script>
    const API = 'https://api.gocjx.com/api/quoting/form';
    const SENSITIVE_RE = /ssn|social.?security|ein|tax.?id|passport|driver.?licen|government.?id/i;
    const app = document.getElementById('app');

    function getSlug() {
      const parts = window.location.pathname.replace(/\/+$/, '').split('/');
      return parts[parts.length - 1] === 'quote' ? '' : parts[parts.length - 1];
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function showLoading() {
      app.innerHTML = '<div class="flex items-center justify-center min-h-screen bg-slate-50"><div class="spinner"></div></div>';
    }

    function showError(msg) {
      app.innerHTML = '<div class="flex items-center justify-center min-h-screen bg-slate-50"><div class="text-center"><div class="text-6xl mb-4 text-slate-300">!</div><h1 class="text-2xl font-bold text-slate-700 mb-2">' + esc(msg) + '</h1><p class="text-slate-500">Please check the URL and try again.</p></div></div>';
    }

    function showSuccess(agencyName) {
      app.innerHTML = '<div class="flex items-center justify-center min-h-screen bg-slate-50"><div class="text-center fade-in"><div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4"><svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div><h1 class="text-2xl font-bold text-slate-800 mb-2">Thank you!</h1><p class="text-slate-600">Your quote request has been submitted.</p><p class="text-sm text-slate-400 mt-2">' + esc(agencyName) + ' will be in touch soon.</p></div></div>';
    }

    async function init() {
      const slug = getSlug();
      if (!slug) { showError('Form not found'); return; }
      showLoading();

      let data;
      try {
        const res = await fetch(API + '/' + encodeURIComponent(slug));
        if (!res.ok) { showError('Form not found'); return; }
        data = await res.json();
        if (!data.success) { showError('Form not found'); return; }
      } catch (e) {
        showError('Unable to load form. Please try again later.');
        return;
      }

      if (data.is_live === false) {
        app.innerHTML = '<div class="flex items-center justify-center min-h-screen bg-slate-50"><div class="text-center py-20"><h2 class="text-xl font-bold text-slate-700 mb-2">Form Not Available</h2><p class="text-slate-500">This form is currently private. Please contact the agency directly.</p></div></div>';
        return;
      }

      renderForm(data, slug);
    }

    function renderForm(data, slug) {
      const ag = data.agency;
      const sections = data.sections || [];
      document.title = (ag.agency_name || 'Agency') + ' Online Quoting';
      const bgColor = ag.background_color || '#f8fafc';
      const hc1 = ag.header_color || '#0ea5e9';
      const hc2 = ag.header_color_2 || hc1;
      const headerBg = hc1 === hc2 ? hc1 : 'linear-gradient(135deg, ' + hc1 + ', ' + hc2 + ')';

      let html = '';

      // Header
      html += '<header class="py-8 px-6 text-white" style="background: ' + headerBg + ';">';
      html += '<div class="max-w-2xl mx-auto flex items-center space-x-4">';
      if (ag.logo_url) {
        html += '<img src="' + esc(ag.logo_url) + '" alt="Logo" class="w-14 h-14 rounded-xl object-cover bg-white/20 shadow-lg" />';
      }
      html += '<div>';
      html += '<h1 class="text-2xl font-bold">' + esc(ag.agency_name) + '</h1>';
      if (ag.description) html += '<p class="text-sm opacity-90 mt-1">' + esc(ag.description) + '</p>';
      html += '</div></div></header>';

      // Banner
      if (ag.banner_url) {
        html += '<div class="max-w-2xl mx-auto mt-6 px-4"><img src="' + esc(ag.banner_url) + '" alt="Banner" class="w-full rounded-xl object-cover shadow-sm" style="max-height:220px;" /></div>';
      }

      // Form
      html += '<div class="max-w-2xl mx-auto px-4 py-8"><form id="quoteForm" class="space-y-6">';

      // Client info
      html += '<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 fade-in">';
      html += '<h2 class="text-lg font-bold text-slate-800 mb-4">Your Information</h2>';
      html += '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">';
      html += inputField('client_first_name', 'First Name', 'text', true);
      html += inputField('client_last_name', 'Last Name', 'text', true);
      html += inputField('client_phone', 'Phone', 'tel', true);
      html += inputField('client_email', 'Email', 'email', true);
      html += '</div>';
      html += '<div class="mt-4">' + inputField('client_address', 'Address', 'text', true) + '</div>';
      html += '</div>';

      // Dynamic sections
      for (const sec of sections) {
        html += '<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 fade-in">';
        html += '<h2 class="text-lg font-bold text-slate-800 mb-1">' + esc(sec.section_name) + '</h2>';
        if (sec.section_description) html += '<p class="text-sm text-slate-500 mb-4">' + esc(sec.section_description) + '</p>';
        html += '<div class="space-y-5">';
        for (const q of (sec.questions || [])) {
          html += renderQuestion(q);
        }
        html += '</div></div>';
      }

      // Notes
      html += '<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 fade-in">';
      html += '<label class="block text-sm font-semibold text-slate-700 mb-2">Additional Notes (optional)</label>';
      html += '<textarea id="field_notes" rows="3" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 resize-none" placeholder="Anything else we should know?"></textarea>';
      html += '</div>';

      // T&C
      html += '<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 fade-in">';
      html += '<label class="flex items-start space-x-3 cursor-pointer">';
      html += '<input type="checkbox" id="terms_cb" class="mt-1 w-4 h-4 rounded border-slate-300 text-sky-600 focus:ring-sky-500" />';
      html += '<span class="text-sm text-slate-600">I understand that <strong>' + esc(ag.agency_name) + '</strong> and CJX are not responsible for any sensitive information I submit. I will not submit Social Security numbers, EINs, driver\'s license numbers, or government IDs. I accept full liability for any sensitive data I provide.</span>';
      html += '</label></div>';

      // Submit
      html += '<div class="flex justify-center">';
      html += '<button type="submit" id="submitBtn" disabled class="px-8 py-3 text-white font-semibold rounded-xl shadow-sm transition-all disabled:opacity-40 disabled:cursor-not-allowed hover:shadow-md" style="background: ' + headerBg + ';">Submit Quote Request</button>';
      html += '</div>';

      // Sensitive warning
      html += '<div id="sensitiveWarn" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800"></div>';

      html += '</form></div>';

      // Footer
      html += '<footer class="text-center py-6 text-xs text-slate-400">Powered by <a href="https://gocjx.com" class="text-sky-500 hover:text-sky-600 font-semibold" target="_blank" rel="noreferrer">CJX</a></footer>';

      app.innerHTML = '';
      app.style.background = bgColor;
      document.body.style.background = bgColor;
      app.innerHTML = html;

      // Wire up T&C checkbox
      const tcBox = document.getElementById('terms_cb');
      const submitBtn = document.getElementById('submitBtn');
      tcBox.addEventListener('change', function() { submitBtn.disabled = !tcBox.checked; });

      // Wire up yes/no conditionals
      document.querySelectorAll('[data-yn-qid]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const qid = btn.dataset.ynQid;
          const val = btn.dataset.ynVal;
          // Toggle active state
          document.querySelectorAll('[data-yn-qid="' + qid + '"]').forEach(function(b) {
            b.classList.remove('ring-2', 'ring-sky-500', 'bg-sky-50', 'border-sky-500');
            b.classList.add('border-slate-300');
          });
          btn.classList.add('ring-2', 'ring-sky-500', 'bg-sky-50', 'border-sky-500');
          btn.classList.remove('border-slate-300');
          document.getElementById('yn_val_' + qid).value = val;
          // Show/hide conditional fields
          document.querySelectorAll('[data-cond-parent="' + qid + '"]').forEach(function(el) {
            el.style.display = el.dataset.condTrigger === val ? 'block' : 'none';
          });
        });
      });

      // Submit handler
      document.getElementById('quoteForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const firstName = document.getElementById('field_client_first_name').value.trim();
        const lastName = document.getElementById('field_client_last_name').value.trim();
        const phone = document.getElementById('field_client_phone').value.trim();
        const email = document.getElementById('field_client_email').value.trim();
        const address = document.getElementById('field_client_address').value.trim();
        const notes = document.getElementById('field_notes').value.trim();

        if (!firstName || !lastName || !phone || !email) {
          alert('Please fill in all required fields (First Name, Last Name, Phone, Email).');
          return;
        }

        // Collect answers
        const answers = {};
        let hasSensitive = false;
        document.querySelectorAll('[data-answer-qid]').forEach(function(el) {
          const label = el.dataset.answerLabel || ('q_' + el.dataset.answerQid);
          let val = '';
          if (el.type === 'checkbox') {
            // collect all checked values for checkbox_list
            if (el.checked) {
              if (!answers[label]) answers[label] = [];
              answers[label].push(el.value);
            }
            return;
          }
          val = el.value;
          if (SENSITIVE_RE.test(label) || SENSITIVE_RE.test(val)) hasSensitive = true;
          if (val) answers[label] = val;
        });

        if (hasSensitive) {
          const warn = document.getElementById('sensitiveWarn');
          warn.classList.remove('hidden');
          warn.textContent = 'Warning: Please do not submit sensitive information such as SSNs, EINs, or government IDs. Those fields have been flagged.';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
          const res = await fetch(API + '/' + encodeURIComponent(slug) + '/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              client_name: firstName + ' ' + lastName,
              client_phone: phone,
              client_email: email,
              client_address: address,
              answers: answers,
              notes: notes || null
            })
          });
          const result = await res.json();
          if (result.success) {
            showSuccess(ag.agency_name);
          } else {
            alert(result.error || 'Something went wrong. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Quote Request';
          }
        } catch (err) {
          alert('Network error. Please check your connection and try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Quote Request';
        }
      });
    }

    function inputField(name, label, type, required) {
      const req = required ? ' <span class="text-rose-500">*</span>' : '';
      return '<div><label class="block text-sm font-semibold text-slate-700 mb-1">' + label + req + '</label>'
        + '<input type="' + type + '" id="field_' + name + '"' + (required ? ' required' : '') + ' class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500" /></div>';
    }

    function renderQuestion(q) {
      let html = '<div>';
      const label = esc(q.question_label);
      const reqMark = q.is_required ? ' <span class="text-rose-500">*</span>' : '';
      const qid = q.id;

      if (q.question_type === 'short_text') {
        html += '<label class="block text-sm font-semibold text-slate-700 mb-1">' + label + reqMark + '</label>';
        html += '<input type="text" data-answer-qid="' + qid + '" data-answer-label="' + esc(q.question_label) + '"' + (q.is_required ? ' required' : '') + ' class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500" />';
      }

      else if (q.question_type === 'yes_no') {
        html += '<label class="block text-sm font-semibold text-slate-700 mb-2">' + label + reqMark + '</label>';
        html += '<input type="hidden" id="yn_val_' + qid + '" data-answer-qid="' + qid + '" data-answer-label="' + esc(q.question_label) + '" value="" />';
        html += '<div class="flex space-x-3">';
        html += '<button type="button" data-yn-qid="' + qid + '" data-yn-val="yes" class="flex-1 py-2 rounded-lg border border-slate-300 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-all">Yes</button>';
        html += '<button type="button" data-yn-qid="' + qid + '" data-yn-val="no" class="flex-1 py-2 rounded-lg border border-slate-300 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-all">No</button>';
        html += '</div>';
        // Conditionals
        if (q.conditionals && q.conditionals.length) {
          for (const c of q.conditionals) {
            html += '<div data-cond-parent="' + qid + '" data-cond-trigger="' + esc(c.trigger_value) + '" style="display:none;" class="mt-3 pl-4 border-l-2 border-sky-200">';
            html += '<label class="block text-sm font-semibold text-slate-700 mb-1">' + esc(c.follow_up_label) + '</label>';
            if (c.follow_up_type === 'dropdown') {
              html += '<select data-answer-qid="' + qid + '_cond_' + c.id + '" data-answer-label="' + esc(c.follow_up_label) + '" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500"><option value="">Select...</option>';
              var opts = [];
              try { opts = JSON.parse(c.follow_up_options_json || '[]'); } catch(e) {}
              for (var o of opts) html += '<option value="' + esc(o) + '">' + esc(o) + '</option>';
              html += '</select>';
            } else {
              html += '<input type="text" data-answer-qid="' + qid + '_cond_' + c.id + '" data-answer-label="' + esc(c.follow_up_label) + '" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500" />';
            }
            html += '</div>';
          }
        }
      }

      else if (q.question_type === 'checkbox_list') {
        html += '<label class="block text-sm font-semibold text-slate-700 mb-2">' + label + reqMark + '</label>';
        let opts = [];
        try { opts = JSON.parse(q.options_json || '[]'); } catch(e) {}
        html += '<div class="space-y-2">';
        for (let i = 0; i < opts.length; i++) {
          html += '<label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" data-answer-qid="' + qid + '" data-answer-label="' + esc(q.question_label) + '" value="' + esc(opts[i]) + '" class="w-4 h-4 rounded border-slate-300 text-sky-600 focus:ring-sky-500" /><span class="text-sm text-slate-700">' + esc(opts[i]) + '</span></label>';
        }
        html += '</div>';
      }

      else if (q.question_type === 'dropdown') {
        html += '<label class="block text-sm font-semibold text-slate-700 mb-1">' + label + reqMark + '</label>';
        html += '<select data-answer-qid="' + qid + '" data-answer-label="' + esc(q.question_label) + '"' + (q.is_required ? ' required' : '') + ' class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500"><option value="">Select...</option>';
        let opts = [];
        try { opts = JSON.parse(q.options_json || '[]'); } catch(e) {}
        for (const o of opts) html += '<option value="' + esc(o) + '">' + esc(o) + '</option>';
        html += '</select>';
      }

      html += '</div>';
      return html;
    }

    init();
  </script>
</body>
</html>
