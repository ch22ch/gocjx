<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/quote/cjx-favicon.svg">
  <title>Online Quoting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
    .spinner { border: 3px solid #e2e8f0; border-top-color: #0ea5e9; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.35s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .progress-bar { transition: width 0.4s ease; }
    .ms-toggle.active { box-shadow: 0 0 0 2px var(--brand); background: color-mix(in srgb, var(--brand) 8%, white); }
  </style>
</head>
<body class="min-h-screen">
  <div id="app"></div>

  <script>
    const API_BASE = 'https://api.gocjx.com/api/quote';
    const app = document.getElementById('app');

    let cfg = null;       // API response
    let slug = '';
    let currentStep = 0;  // 0=welcome, 1..N=sections, N+1=confirm, N+2=thanks
    let answers = {};     // { sectionId: { questionId: value } }
    let activeSections = [];

    // --- Helpers ---
    function getSlug() {
      const parts = window.location.pathname.replace(/\/+$/, '').split('/');
      return parts[parts.length - 1] === 'quote' ? '' : parts[parts.length - 1];
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    // --- Init ---
    async function init() {
      slug = getSlug();
      if (!slug) { showError('Form not found'); return; }
      showLoading();
      try {
        const res = await fetch(`${API_BASE}/${encodeURIComponent(slug)}`);
        if (!res.ok) { showError('Form not found'); return; }
        cfg = await res.json();
        if (cfg.error) { showError(cfg.error); return; }
      } catch (e) {
        showError('Unable to load form. Please try again later.');
        return;
      }
      document.title = (cfg.agencyName || 'Agency') + ' - Get a Quote';
      document.documentElement.style.setProperty('--brand', cfg.buttonColor || cfg.primaryColor || '#0ea5e9');
      computeActiveSections();
      render();
    }

    function computeActiveSections() {
      const sections = (cfg.config && cfg.config.sections) || [];
      activeSections = sections.filter(sec => {
        if (!sec.activatedBy) return true;
        const parentSection = sections.find(s => s.questions && s.questions.some(q => q.id === sec.activatedBy.questionId));
        if (!parentSection) return true;
        const val = (answers[parentSection.id] || {})[sec.activatedBy.questionId];
        return val && sec.activatedBy.values.includes(val);
      });
    }

    function totalSteps() { return activeSections.length + 2; } // welcome + sections + confirm
    function progressPct() {
      if (currentStep === 0) return 0;
      if (currentStep > activeSections.length) return 100;
      return Math.round((currentStep / (activeSections.length + 1)) * 100);
    }

    // --- Screens ---
    function showLoading() {
      app.innerHTML = '<div class="flex items-center justify-center min-h-screen"><div class="spinner"></div></div>';
    }
    function showError(msg) {
      app.innerHTML = `<div class="flex items-center justify-center min-h-screen"><div class="text-center px-6"><div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4"><svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M12 3a9 9 0 100 18 9 9 0 000-18z"/></svg></div><h1 class="text-xl font-bold text-slate-700 mb-2">${esc(msg)}</h1><p class="text-slate-500 text-sm">Please check the URL and try again.</p></div></div>`;
    }

    function render() {
      if (currentStep === 0) renderWelcome();
      else if (currentStep <= activeSections.length) renderSection(activeSections[currentStep - 1]);
      else if (currentStep === activeSections.length + 1) renderConfirm();
      else renderThankYou();
    }

    function shell(inner, showProgress) {
      const pc = cfg.primaryColor || '#0ea5e9';
      const ac = cfg.accentColor || pc;
      const grad = pc === ac ? pc : `linear-gradient(135deg, ${pc}, ${ac})`;
      let h = '';
      // Header
      h += `<div class="py-5 px-6 text-white" style="background:${grad};">`;
      h += `<div class="max-w-lg mx-auto flex items-center gap-3">`;
      if (cfg.logoUrl) h += `<img src="${esc(cfg.logoUrl)}" alt="Logo" class="w-10 h-10 rounded-lg object-cover bg-white/20 shadow" />`;
      h += `<span class="text-lg font-bold">${esc(cfg.agencyName)}</span>`;
      h += `</div></div>`;
      // Progress
      if (showProgress) {
        h += `<div class="max-w-lg mx-auto px-6 mt-4"><div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden"><div class="progress-bar h-2 rounded-full" style="width:${progressPct()}%;background:${cfg.buttonColor || pc};"></div></div><p class="text-xs text-slate-400 mt-1 text-right">${progressPct()}% complete</p></div>`;
      }
      // Body
      h += `<div class="max-w-lg mx-auto px-6 py-8 fade-in">${inner}</div>`;
      // Footer
      h += poweredFooter();
      app.innerHTML = h;
    }

    function poweredFooter() {
      return `<div style="text-align:center;padding:20px 0 12px;"><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#0f172a;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,0.15);"><span style="font-size:11px;color:#94a3b8;font-weight:500;">Powered by</span><span style="letter-spacing:-0.04em;font-weight:900;font-size:13px;"><span style="color:#ffffff;">C</span><span style="color:#38bdf8;font-weight:800;">j</span><span style="color:#0ea5e9;">X</span></span></div></div>`;
    }

    function brandBtn(text, extra) {
      const bc = cfg.buttonColor || cfg.primaryColor || '#0ea5e9';
      return `<button type="button" ${extra || ''} class="px-8 py-3 text-white font-semibold rounded-xl shadow-sm hover:shadow-md transition-all text-sm" style="background:${bc};">${esc(text)}</button>`;
    }

    function backBtn() {
      return `<button type="button" onclick="goBack()" class="px-6 py-3 text-slate-600 font-semibold rounded-xl border border-slate-300 hover:bg-slate-50 transition-all text-sm">Back</button>`;
    }

    // --- Welcome ---
    function renderWelcome() {
      let h = `<div class="text-center py-12">`;
      if (cfg.logoUrl) h += `<img src="${esc(cfg.logoUrl)}" alt="Logo" class="w-20 h-20 rounded-2xl object-cover mx-auto mb-6 shadow-lg" />`;
      h += `<h1 class="text-2xl font-bold text-slate-800 mb-2">${esc(cfg.agencyName)}</h1>`;
      h += `<p class="text-slate-500 mb-8">Let's get the process started.</p>`;
      h += `<div>${brandBtn('Get My Quote', 'onclick="nextStep()"')}</div>`;
      h += `</div>`;
      shell(h, false);
    }

    // --- Section form ---
    function renderSection(section) {
      if (!answers[section.id]) answers[section.id] = {};
      let h = `<h2 class="text-xl font-bold text-slate-800 mb-6">${esc(section.title)}</h2>`;
      h += `<div class="space-y-5">`;
      for (const q of (section.questions || [])) {
        h += renderQuestion(section.id, q);
      }
      h += `</div>`;
      h += `<div id="section-errors" class="hidden mt-4 text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg p-3"></div>`;
      h += `<div class="flex justify-between mt-8">`;
      h += backBtn();
      h += brandBtn('Continue', 'onclick="validateAndNext()"');
      h += `</div>`;
      shell(h, true);
      hydrateSection(section);
    }

    function renderQuestion(secId, q) {
      const val = answers[secId]?.[q.id];
      const req = q.required ? ' <span class="text-rose-500">*</span>' : '';
      let h = `<div data-qid="${q.id}">`;
      h += `<label class="block text-sm font-semibold text-slate-700 mb-1.5">${esc(q.label)}${req}</label>`;

      if (q.type === 'text') {
        h += `<input type="text" data-field="${q.id}" value="${esc(val || '')}" placeholder="${esc(q.placeholder || '')}" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:border-transparent" style="--tw-ring-color:${cfg.buttonColor || '#0ea5e9'}" />`;
      }
      else if (q.type === 'number') {
        h += `<input type="number" data-field="${q.id}" value="${esc(val || '')}" placeholder="${esc(q.placeholder || '')}" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:border-transparent" style="--tw-ring-color:${cfg.buttonColor || '#0ea5e9'}" />`;
      }
      else if (q.type === 'date') {
        h += `<input type="date" data-field="${q.id}" value="${esc(val || '')}" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:border-transparent" style="--tw-ring-color:${cfg.buttonColor || '#0ea5e9'}" />`;
      }
      else if (q.type === 'yesno') {
        const yActive = val === 'yes' ? 'active' : '';
        const nActive = val === 'no' ? 'active' : '';
        h += `<div class="flex gap-3"><button type="button" data-yn="${q.id}" data-val="yes" class="ms-toggle ${yActive} flex-1 py-2.5 rounded-lg border border-slate-300 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-all" style="--brand:${cfg.buttonColor || '#0ea5e9'}">Yes</button>`;
        h += `<button type="button" data-yn="${q.id}" data-val="no" class="ms-toggle ${nActive} flex-1 py-2.5 rounded-lg border border-slate-300 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-all" style="--brand:${cfg.buttonColor || '#0ea5e9'}">No</button></div>`;
      }
      else if (q.type === 'select') {
        h += `<select data-field="${q.id}" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:border-transparent" style="--tw-ring-color:${cfg.buttonColor || '#0ea5e9'}"><option value="">Select...</option>`;
        for (const o of (q.options || [])) {
          const sel = val === o ? ' selected' : '';
          h += `<option value="${esc(o)}"${sel}>${esc(o)}</option>`;
        }
        h += `</select>`;
      }
      else if (q.type === 'multiselect') {
        const selected = Array.isArray(val) ? val : [];
        h += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-2">`;
        for (const o of (q.options || [])) {
          const optVal = typeof o === 'object' ? o.value : o;
          const optLabel = typeof o === 'object' ? o.label : o;
          const isActive = selected.includes(optVal) ? 'active' : '';
          h += `<button type="button" data-ms="${q.id}" data-val="${esc(optVal)}" class="ms-toggle ${isActive} px-4 py-2.5 rounded-lg border border-slate-300 text-sm font-medium text-slate-700 hover:bg-slate-50 transition-all text-left" style="--brand:${cfg.buttonColor || '#0ea5e9'}">${esc(optLabel)}</button>`;
        }
        h += `</div>`;
      }
      h += `<p class="field-error text-xs text-rose-500 mt-1 hidden"></p>`;
      h += `</div>`;
      return h;
    }

    function hydrateSection(section) {
      const secId = section.id;
      // Text / number / date / select inputs
      document.querySelectorAll('[data-field]').forEach(el => {
        el.addEventListener('input', () => { answers[secId][el.dataset.field] = el.value; recomputeIfNeeded(el.dataset.field); });
        el.addEventListener('change', () => { answers[secId][el.dataset.field] = el.value; recomputeIfNeeded(el.dataset.field); });
      });
      // Yes/No
      document.querySelectorAll('[data-yn]').forEach(btn => {
        btn.addEventListener('click', () => {
          const qid = btn.dataset.yn;
          answers[secId][qid] = btn.dataset.val;
          document.querySelectorAll(`[data-yn="${qid}"]`).forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          recomputeIfNeeded(qid);
        });
      });
      // Multiselect
      document.querySelectorAll('[data-ms]').forEach(btn => {
        btn.addEventListener('click', () => {
          const qid = btn.dataset.ms;
          if (!answers[secId][qid]) answers[secId][qid] = [];
          const val = btn.dataset.val;
          const arr = answers[secId][qid];
          const idx = arr.indexOf(val);
          if (idx >= 0) { arr.splice(idx, 1); btn.classList.remove('active'); }
          else { arr.push(val); btn.classList.add('active'); }
        });
      });
    }

    function recomputeIfNeeded(qid) {
      const sections = (cfg.config && cfg.config.sections) || [];
      const hasDependent = sections.some(s => s.activatedBy && s.activatedBy.questionId === qid);
      if (hasDependent) {
        const oldLen = activeSections.length;
        computeActiveSections();
        if (activeSections.length !== oldLen && currentStep > activeSections.length) {
          currentStep = activeSections.length + 1;
        }
      }
    }

    // --- Validation ---
    function validateAndNext() {
      const section = activeSections[currentStep - 1];
      const secAnswers = answers[section.id] || {};
      let errors = [];
      const errBox = document.getElementById('section-errors');
      // Clear previous
      document.querySelectorAll('.field-error').forEach(e => { e.classList.add('hidden'); e.textContent = ''; });
      for (const q of (section.questions || [])) {
        if (!q.required) continue;
        const val = secAnswers[q.id];
        let invalid = false;
        if (q.type === 'multiselect') {
          invalid = !val || !Array.isArray(val) || val.length === 0;
        } else {
          invalid = !val || (typeof val === 'string' && val.trim() === '');
        }
        if (invalid) {
          errors.push(q.label);
          const wrap = document.querySelector(`[data-qid="${q.id}"] .field-error`);
          if (wrap) { wrap.textContent = 'This field is required'; wrap.classList.remove('hidden'); }
        }
      }
      if (errors.length > 0) {
        errBox.classList.remove('hidden');
        errBox.textContent = 'Please complete all required fields.';
        return;
      }
      errBox.classList.add('hidden');
      nextStep();
    }

    // --- Confirm ---
    function renderConfirm() {
      let h = `<h2 class="text-xl font-bold text-slate-800 mb-2">Review Your Information</h2>`;
      h += `<p class="text-sm text-slate-500 mb-6">Please review your answers before submitting.</p>`;
      for (const sec of activeSections) {
        const secAns = answers[sec.id] || {};
        h += `<div class="bg-white rounded-xl border border-slate-200 p-5 mb-4">`;
        h += `<h3 class="text-sm font-bold text-slate-600 uppercase tracking-wide mb-3">${esc(sec.title)}</h3>`;
        h += `<dl class="space-y-2">`;
        for (const q of (sec.questions || [])) {
          let val = secAns[q.id];
          if (val === undefined || val === null || val === '') continue;
          if (Array.isArray(val)) {
            // Resolve labels for multiselect
            val = val.map(v => {
              const opt = (q.options || []).find(o => (typeof o === 'object' ? o.value : o) === v);
              return opt ? (typeof opt === 'object' ? opt.label : opt) : v;
            }).join(', ');
          }
          h += `<div class="flex justify-between gap-4"><dt class="text-sm text-slate-500">${esc(q.label)}</dt><dd class="text-sm font-medium text-slate-800 text-right">${esc(String(val))}</dd></div>`;
        }
        h += `</dl></div>`;
      }
      h += `<div class="flex justify-between mt-8">`;
      h += backBtn();
      h += brandBtn('Submit', 'id="submitBtn" onclick="submitForm()"');
      h += `</div>`;
      shell(h, true);
    }

    // --- Thank You ---
    function renderThankYou() {
      const msg = cfg.thankYouMessage || 'Thank you for submitting your quote request. One of our agents will reach out to you soon.';
      let h = `<div class="text-center py-12 fade-in">`;
      h += `<div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-5"><svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>`;
      h += `<h1 class="text-2xl font-bold text-slate-800 mb-3">Thank You!</h1>`;
      h += `<p class="text-slate-600 max-w-sm mx-auto">${esc(msg)}</p>`;
      h += `</div>`;
      shell(h, false);
    }

    // --- Navigation ---
    function nextStep() {
      currentStep++;
      computeActiveSections();
      // Skip sections that are no longer active
      while (currentStep >= 1 && currentStep <= activeSections.length) {
        const sec = activeSections[currentStep - 1];
        if (!sec) break;
        // This section is active, render it
        break;
      }
      // If currentStep exceeds active sections, go to confirm
      if (currentStep > activeSections.length + 1) currentStep = activeSections.length + 1;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.goBack = function() {
      if (currentStep <= 0) return;
      currentStep--;
      computeActiveSections();
      // Skip inactive sections going backward
      while (currentStep >= 1 && currentStep <= activeSections.length) {
        const sec = activeSections[currentStep - 1];
        if (sec) break;
        currentStep--;
      }
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // --- Submit ---
    async function submitForm() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.style.opacity = '0.5';
      btn.textContent = 'Submitting...';
      try {
        const res = await fetch(`${API_BASE}/${encodeURIComponent(slug)}/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            answers: answers,
            agencyId: cfg.agencyId,
            source: cfg.source
          })
        });
        const result = await res.json();
        if (result.success) {
          currentStep = activeSections.length + 2;
          render();
        } else {
          alert(result.error || 'Something went wrong. Please try again.');
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.textContent = 'Submit';
        }
      } catch (e) {
        alert('Network error. Please check your connection and try again.');
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.textContent = 'Submit';
      }
    }

    // Expose for inline onclick
    window.nextStep = nextStep;
    window.validateAndNext = validateAndNext;
    window.submitForm = submitForm;

    init();
  </script>
</body>
</html>
